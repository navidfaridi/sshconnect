<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- پس‌زمینه: گرادیان از گوشه بالا-چپ به پایین-راست -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1c2333"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- پس‌زمینه اصلی -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>

  <!-- لبه داخلی خیلی ظریف برای حس عمق (فقط در سایزهای بزرگ دیده می‌شه) -->
  <rect x="2" y="2" width="508" height="508" rx="108"
        fill="none" stroke="white" stroke-opacity="0.07" stroke-width="3"/>

  <!--
    علامت >_ (پرامپت ترمینال)

    شِوِرون >:
      مرکز عمودی: y=248 (کمی بالاتر از مرکز برای تعادل بصری با _)
      نقاط: (108, 178) → apex (218, 248) → (108, 318)
      ضخامت: 52px با سر گرد

    خط زیر _:
      کنار راست > تا انتهای محدوده محتوا
      موقعیت: x=248 تا x=408, y مرکز در 318 (هم‌راستا با پایین >)
      ارتفاع: 46px با گوشه گرد
  -->

  <!-- > شوِرون — سفید روشن، وزن بصری قوی -->
  <path
    d="M 108,178 L 218,248 L 108,318"
    stroke="#dde4ef"
    stroke-width="52"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- _ کرسر ترمینال — آبی آکسنت -->
  <rect x="248" y="295" width="160" height="46" rx="23" fill="#4493f8"/>

</svg>
